<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transmed — Invoice Management</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{font-family:'Plus Jakarta Sans';background:#f5f7fb;margin:0}
header{background:#0B1E35;color:#fff;padding:15px 25px;display:flex;justify-content:space-between}
.layout{display:flex}
.sidebar{width:240px;background:#fff;padding:15px;border-right:1px solid #ddd}
.main{flex:1;padding:20px}

.btn{background:#2563EB;color:#fff;border:none;padding:8px 15px;border-radius:6px;cursor:pointer}
.card{background:#fff;padding:20px;border-radius:10px;border:1px solid #ddd;margin-top:15px}

.upload-zone{border:2px dashed #bbb;padding:30px;text-align:center;border-radius:10px;cursor:pointer}
.upload-zone:hover{border-color:#2563EB}

.progress{height:6px;background:#ddd;margin-top:10px;border-radius:3px;overflow:hidden}
.progress div{height:100%;background:#2563EB;width:0%}

.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:10px;width:400px}
</style>
</head>

<body>

<header>
  <div><b>TRANSMED</b></div>
  <div>System Active</div>
</header>

<div class="layout">

<div class="sidebar">
  <div><b>Menu</b></div>
  <div style="margin-top:10px;cursor:pointer" onclick="openUpload()">📤 Upload</div>
</div>

<div class="main">

  <h2>Invoice Repository</h2>
  <button class="btn" onclick="openUpload()">+ Upload Invoice</button>

  <!-- UPLOAD -->
  <div class="card" id="uploadCard" style="display:none">
    <h4>Upload Invoice</h4>

    <div class="upload-zone" id="uploadZone">
      Drop file here or click
      <input type="file" id="fileInput" style="display:none">
    </div>

    <div class="progress" id="progressBar" style="display:none">
      <div id="progressFill"></div>
    </div>
  </div>

  <!-- EMPTY -->
  <div class="card">
    No invoices yet
  </div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Extracted Data</h3>
    <div id="modalContent"></div>
    <br>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const zone = document.getElementById("uploadZone");
const input = document.getElementById("fileInput");

zone.onclick = () => input.click();

zone.addEventListener("dragover", e=>{
  e.preventDefault();
});

zone.addEventListener("drop", e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

input.addEventListener("change", ()=>{
  handleFiles(input.files);
});

function openUpload(){
  document.getElementById("uploadCard").style.display="block";
}

function showProgress(p){
  document.getElementById("progressBar").style.display="block";
  document.getElementById("progressFill").style.width=p+"%";
}

function hideProgress(){
  document.getElementById("progressBar").style.display="none";
}

async function handleFiles(files){
  if(!files || !files.length) return;

  const file = files[0];
  input.value = "";

  let fileDataUrl = null;
  let processFile = file;

  showProgress(10);

  try{

    const ext = file.name.split('.').pop().toLowerCase();

    if(ext === "pdf"){
      showProgress(30);

      const reader = new FileReader();

      const pdfData = await new Promise(res=>{
        reader.onload = e => res(e.target.result);
        reader.readAsArrayBuffer(file);
      });

      const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
      const page = await pdf.getPage(1);

      const viewport = page.getViewport({scale:2});
      const canvas = document.createElement("canvas");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: canvas.getContext("2d"),
        viewport
      }).promise;

      fileDataUrl = canvas.toDataURL();

      const blob = await new Promise(r=>canvas.toBlob(r));
      processFile = new File([blob], "converted.jpg");

    } else {
      fileDataUrl = await new Promise(res=>{
        const r = new FileReader();
        r.onload = e=>res(e.target.result);
        r.readAsDataURL(file);
      });
    }

    showProgress(60);

    const formData = new FormData();
    formData.append("file", processFile);

    const res = await fetch("/api/process", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if(!res.ok){
      alert("Error processing file");
      hideProgress();
      return;
    }

    showProgress(100);

    setTimeout(()=>{
      hideProgress();
      openModal(data);
    },300);

  }catch(err){
    alert(err.message);
    hideProgress();
  }
}

function openModal(data){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML =
    "<pre>"+JSON.stringify(data,null,2)+"</pre>";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
